<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BibleMapped — Map Navigator</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>

  <link rel="stylesheet" href="/maps/navigator/map.css?v=10" />
  <script src="/maps/navigator/map.js?v=10" defer></script>
  <style>
    .bm-site-footer {
      margin: 0;
      padding: clamp(28px, 4vw, 42px) 20px;
      background: #7b2cff;
      color: #ffffff;
      border: 0;
      text-align: center;
    }

    .bm-site-footer-inner {
      width: min(1100px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(150px, 220px) minmax(0, 1fr);
      align-items: center;
      justify-items: start;
      gap: 10px 28px;
      text-align: left;
    }

    .bm-footer-wordmark {
      display: block;
      width: min(220px, 70vw);
      height: auto;
      grid-row: 1 / span 4;
      justify-self: start;
      filter: drop-shadow(0 10px 18px rgba(28, 7, 84, 0.24));
    }

    .bm-footer-links {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: rgba(255, 255, 255, 0.92);
      font: 400 0.84rem/1.3 Inter, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bm-footer-links,
    .bm-footer-contact,
    .bm-footer-social-row,
    .bm-footer-copy {
      grid-column: 2;
    }

    .bm-footer-links a,
    .bm-footer-contact a {
      color: inherit;
      text-decoration: none;
      transition: opacity 180ms ease;
    }

    .bm-footer-links a:hover,
    .bm-footer-links a:focus-visible,
    .bm-footer-contact a:hover,
    .bm-footer-contact a:focus-visible {
      opacity: 0.78;
    }

    .bm-footer-contact {
      color: rgba(255, 255, 255, 0.9);
      font: 400 0.82rem/1.3 Inter, Arial, sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .bm-footer-social-row {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 9px;
    }

    .bm-footer-social-emblem {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #7b2cff;
      overflow: hidden;
      font-size: 0.76rem;
      font-weight: 950;
      line-height: 1;
      text-decoration: none;
      box-shadow: 0 8px 16px rgba(28, 7, 84, 0.22);
      transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    .bm-footer-social-emblem:hover,
    .bm-footer-social-emblem:focus-visible {
      transform: translateY(-2px);
      opacity: 0.92;
      box-shadow: 0 12px 20px rgba(28, 7, 84, 0.28);
    }

    .bm-footer-social-emblem img {
      width: 23px;
      height: 23px;
      object-fit: contain;
    }

    .bm-footer-social-emblem.tiktok-emblem img {
      width: 25px;
      height: 25px;
    }

    .bm-footer-social-emblem.instagram-emblem img {
      width: 25px;
      height: 25px;
    }

    .bm-footer-social-emblem.tiktok-emblem img,
    .bm-footer-social-emblem.instagram-emblem img {
      border-radius: 50%;
    }

    .bm-footer-social-emblem.youtube-emblem img {
      width: 26px;
      height: 20px;
    }

    .bm-footer-social-emblem.facebook-emblem {
      background: #3b75bb;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .bm-footer-social-emblem.patreon-emblem {
      background: #ffffff;
    }

    .bm-footer-patreon-letter {
      color: #000000;
      font: 700 1.12rem/1 Inter, Arial, sans-serif;
    }

    .bm-footer-copy {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font: 400 0.78rem/1.3 Inter, Arial, sans-serif;
      letter-spacing: 0.04em;
    }

    @media (max-width: 768px) {
      .bm-site-footer-inner {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .bm-footer-wordmark,
      .bm-footer-links,
      .bm-footer-contact,
      .bm-footer-social-row,
      .bm-footer-copy {
        grid-column: 1;
      }

      .bm-footer-wordmark {
        grid-row: auto;
      }

      .bm-footer-links,
      .bm-footer-social-row {
        justify-content: center;
      }
    }
  </style>

</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand__title">BibleMapped</div>
        <div class="brand__sub">Map Navigator</div>
      </div>

      <div class="search">
        <input id="searchInput" type="text" placeholder="Search places..." />
      </div>

      <div class="section">
        <div class="section__title">Filters</div>
        <div class="filterGroup">
          <div class="filterGroup__label">Type</div>
          <div id="typeFilters" class="filterOptions"></div>
        </div>
        <div class="filterGroup">
          <div class="filterGroup__label">Book</div>
          <div id="bookFilters" class="filterOptions"></div>
        </div>
      </div>

      <div class="section">
        <div class="section__title">Places</div>
        <div id="placesList" class="list"></div>
      </div>

      <div class="section">
        <div class="section__title">Layers</div>
        <label class="check">
          <input type="checkbox" id="togglePlaces" checked />
          <span>Show places</span>
        </label>
        <label class="check">
          <input type="checkbox" id="toggleRoutes" />
          <span>Show routes (optional)</span>
        </label>
      </div>

      <div class="section">
        <button id="homeBtn" class="btn">Home view</button>
      </div>
    </aside>

    <main class="mapWrap">
      <div id="map" style="height:100vh; width:100%;"></div>
      <div id="infoDrawer" class="drawer" aria-live="polite">
        <div class="drawer__header">
          <div>
            <div id="drawerTitle" class="drawer__title">Select a place</div>
            <div id="drawerMeta" class="drawer__meta"></div>
          </div>
          <button id="drawerClose" class="drawer__close" aria-label="Close details">×</button>
        </div>
        <div class="drawer__body">
          <div class="drawer__row">
            <span class="pill">Type</span>
            <span id="drawerType" class="muted"></span>
          </div>
          <div class="drawer__row">
            <span class="pill">Book</span>
            <span id="drawerBook" class="muted"></span>
          </div>
          <div class="drawer__row">
            <span class="pill">Refs</span>
            <div id="drawerRefs" class="chips"></div>
          </div>
          <div class="drawer__row">
            <span class="pill">Tags</span>
            <div id="drawerTags" class="chips"></div>
          </div>
        </div>
      </div>

      <button id="menuBtn" class="menuBtn" aria-label="Toggle menu">☰</button>
    </main>
  </div>
<footer class="bm-site-footer" aria-label="Bible Mapped footer">
      <div class="bm-site-footer-inner">
        <img class="bm-footer-wordmark" src="/assets/footer-brand-logo.png" alt="Bible Mapped" />

        <nav class="bm-footer-links" aria-label="Footer navigation">
          <a href="/">Home</a>
          <span>|</span>
          <a href="/about/">About</a>
          <span>|</span>
          <a href="/books/">Books</a>
          <span>|</span>
          <a href="/characters/">People</a>
          <span>|</span>
          <a href="/maps/">Maps</a>
          <span>|</span>
          <a href="/case-studies/">Case Studies</a>
          <span>|</span>
          <a href="/terms/">Terms of Use</a>
          <span>|</span>
          <a href="/help/">Help Center</a>
          <span>|</span>
          <a href="/heaven/">Are You Going to Heaven?</a>
        </nav>

        <div class="bm-footer-contact">
          <a href="mailto:calvin@biblemapped.com">Contact Us</a>
        </div>

        <div class="bm-footer-social-row" aria-label="Bible Mapped social links">
          <a class="bm-footer-social-emblem tiktok-emblem" href="https://www.tiktok.com/@biblemapped" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
            <img src="/assets/tiktok-logo.png" alt="TikTok" />
          </a>
          <a class="bm-footer-social-emblem instagram-emblem" href="#" aria-label="Instagram">
            <img src="/assets/instagram-logo.png" alt="Instagram" />
          </a>
          <a class="bm-footer-social-emblem patreon-emblem" href="https://www.patreon.com/cw/Biblemapped" target="_blank" rel="noopener noreferrer" aria-label="Patreon">
            <span class="bm-footer-patreon-letter" aria-hidden="true">P</span>
          </a>
          <a class="bm-footer-social-emblem youtube-emblem" href="https://www.youtube.com/@biblemapped" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <img src="/assets/youtube-logo.png" alt="YouTube" />
          </a>
          <a class="bm-footer-social-emblem facebook-emblem" href="#" aria-label="Facebook">f</a>
        </div>

        <p class="bm-footer-copy">&copy; 2026 Bible Mapped. All rights reserved.</p>
      </div>
    </footer>
</body>
</html>
