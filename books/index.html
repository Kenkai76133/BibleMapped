<head>
  <meta charset="UTF-8" />

  <title>Books | Bible Mapped</title>

    name="description"
    content="Explore the books of the Bible through Bible Mapped’s visual study system."
  />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    :root {
      --books-ink: #0b1020;
      --books-text: #1f2933;
      --books-purple: #7c3aed;
      --header-height: 72px;
      --editorial: "Cormorant Garamond", Georgia, serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: var(--books-ink);
    }

    body {
      overflow-x: hidden;
    }

    img,
    video,
    svg,
    canvas,
    iframe {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a,
    button {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .books-page-main {
      min-height: calc(100vh - var(--header-height));
      background: #ffffff;
      padding: clamp(28px, 4vw, 52px) 20px clamp(64px, 8vw, 100px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .books-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .books-hero {
      min-height: calc(100vh - var(--header-height) - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .books-hero-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 4vw, 34px);
    }

    .bible-stage {
      width: min(820px, 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: bibleSlideIn 2.4s ease-in-out both;
      will-change: transform, opacity;
    }

    .bible-cover-image {
      width: min(620px, 90vw);
      max-width: 100%;
      filter: none;
      box-shadow: none;
      background: transparent;
    }

    @keyframes bibleSlideIn {
      0% {
        opacity: 0;
        transform: translateX(-34vw);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .testament-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .testament-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      min-height: 54px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid rgba(11, 16, 32, 0.12);
      background: #ffffff;
      color: var(--books-ink);
      font-size: 0.86rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background 180ms ease,
        color 180ms ease;
    }

    .testament-button:hover {
      transform: translateY(-2px);
      border-color: rgba(124, 58, 237, 0.38);
    }

    .testament-button.primary {
      background: var(--books-ink);
      color: #ffffff;
      border-color: var(--books-ink);
    }

    .testament-button.primary:hover {
      background: var(--books-purple);
      border-color: var(--books-purple);
    }

    .testament-button.secondary {
      background: #ffffff;
      color: var(--books-ink);
    }

    @media (prefers-reduced-motion: reduce) {
      .bible-stage {
        animation: none;
      }

      .testament-button {
        transition: none;
      }
    }

    @media (max-width: 820px) {
      :root {
        --header-height: 66px;
      }

      .books-page-main {
        padding-top: 24px;
      }

      .books-hero {
        min-height: auto;
        padding: 20px 0 40px;
      }

      .bible-cover-image {
        width: min(520px, 92vw);
      }
    }

    @media (max-width: 520px) {
      .books-page-main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .bible-cover-image {
        width: min(430px, 96vw);
      }

      .testament-buttons {
        width: 100%;
        flex-direction: column;
      }

      .testament-button {
        width: min(310px, 100%);
      }
    }
  </style>
</head>
