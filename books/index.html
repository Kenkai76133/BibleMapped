<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Books | BibleMapped</title>
  <meta
    name="description"
    content="Explore Bible books by testament through an animated BibleMapped book-entry experience."
  />

  <link rel="stylesheet" href="../src/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --books-ink: #0b1020;
      --books-text: #1f2933;
      --books-muted: #667085;
      --books-paper: #fcfbf8;
      --books-cloud: #f7f6f2;
      --books-line: #ddd8d0;
      --books-soft-line: rgba(31, 41, 51, 0.14);
      --books-purple: #7c3aed;
      --books-gold: #c89b3c;
      --books-red: #d72638;
      --header-height: 72px;
      --nav-bg: #ffffff;
      --retracted-width: clamp(96px, 9vw, 132px);
      --editorial: "Cormorant Garamond", Georgia, serif;
      --blackletter: "UnifrakturCook", "Old English Text MT", Georgia, serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--books-cloud);
      color: var(--books-ink);
    }

    body {
      overflow-x: clip;
    }

    img,
    video,
    svg,
    canvas,
    iframe {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .container,
    .site-container {
      width: min(100% - 2rem, 1200px);
      margin-inline: auto;
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .site-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(31, 41, 51, 0.08);
      background: var(--nav-bg);
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      margin: 0;
      border-radius: 0;
      overflow: hidden;
    }

    .nav-wrap {
      width: min(1180px, calc(100% - 32px));
      max-width: none;
      margin: 0 auto;
      padding: 0 18px;
      display: grid;
      grid-template-columns: minmax(140px, 180px) minmax(0, 1fr) minmax(60px, 90px);
      align-items: center;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    .nav-wrap--simple {
      justify-content: initial;
    }

    .brand {
      color: var(--books-ink);
      font-size: clamp(1.15rem, 2vw, 1.55rem);
      font-weight: 950;
      letter-spacing: 0.01em;
      text-decoration: none;
      max-width: 180px;
      overflow: hidden;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-self: center;
      justify-content: space-evenly;
      width: 100%;
      gap: clamp(0.8rem, 2vw, 2.2rem);
    }

    .main-nav a {
      padding: 8px 0;
      border: 0;
      border-radius: 0;
      color: var(--books-ink);
      background: transparent;
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .main-nav a:hover,
    .main-nav a:focus-visible {
      transform: translateY(-2px);
      color: var(--books-purple);
      outline: none;
    }

    .nav-right {
      justify-self: end;
      position: absolute;
      right: 0;
      top: 50%;
      z-index: 2;
      transform: translateY(-50%);
      background: var(--nav-bg);
      color: var(--books-ink);
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 180ms ease, color 180ms ease;
    }

    .nav-right:hover,
    .nav-right:focus-visible {
      color: var(--books-purple);
      transform: translateY(calc(-50% - 2px));
      outline: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .bm-section-footer {
      margin: 0;
      padding: 31px clamp(22px, 5vw, 76px);
      background: var(--books-purple);
      color: #ffffff;
    }

    .bm-section-footer-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .bm-section-footer p {
      margin: 0;
      font-size: 1rem;
      font-weight: 400;
    }

    .bm-section-footer-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 18px;
    }

    .bm-section-footer a {
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
    }

    .bm-section-footer a:hover,
    .bm-section-footer a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .books-entry-main {
      min-height: calc(100vh - var(--header-height));
    }

    .testament-stage {
      width: 100%;
      min-height: calc(100svh - var(--header-height));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      overflow: hidden;
      transition: grid-template-columns 760ms cubic-bezier(0.2, 0.9, 0.18, 1);
      background: var(--books-cloud);
    }

    .testament-stage.is-old-open {
      grid-template-columns: minmax(0, calc(100% - var(--retracted-width))) var(--retracted-width);
    }

    .testament-stage.is-new-open {
      grid-template-columns: var(--retracted-width) minmax(0, calc(100% - var(--retracted-width)));
    }

    .testament-panel {
      position: relative;
      min-width: 0;
      min-height: calc(100svh - var(--header-height));
      overflow: hidden;
      border: 0;
      border-right: 1px solid var(--books-soft-line);
      background: var(--books-paper);
      isolation: isolate;
      transition: background 460ms ease, filter 460ms ease;
    }

    .testament-panel:last-child {
      border-right: 0;
    }

    .testament-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border: 1px dashed rgba(31, 41, 51, 0.2);
      pointer-events: none;
      transition: inset 540ms ease, opacity 540ms ease, border-color 540ms ease;
    }

    .testament-stage.is-old-open .testament-panel--new,
    .testament-stage.is-new-open .testament-panel--old {
      background: #efebe3;
      filter: saturate(0.8);
      box-shadow: inset 18px 0 36px rgba(11, 16, 32, 0.08);
    }

    .testament-stage.is-new-open .testament-panel--old {
      box-shadow: inset -18px 0 36px rgba(11, 16, 32, 0.08);
    }

    .testament-stage.is-old-open .testament-panel--new::before,
    .testament-stage.is-new-open .testament-panel--old::before {
      inset: 0;
      opacity: 0.35;
    }

    .testament-trigger {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--books-ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(22px, 5vw, 62px);
    }

    .testament-slot-image {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 0;
      width: min(82%, calc((100svh - var(--header-height) - 72px) * 9 / 16));
      max-width: 540px;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      transform: translate(-50%, -50%);
      opacity: 0.9;
      filter: saturate(0.94) sepia(0.08);
      pointer-events: none;
      box-shadow: 0 16px 34px rgba(11, 16, 32, 0.18);
    }

    .testament-trigger:focus-visible {
      outline: 3px solid rgba(124, 58, 237, 0.45);
      outline-offset: -8px;
    }

    .testament-label-stack {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 12px;
      width: min(520px, 90%);
      transition: transform 720ms cubic-bezier(0.2, 0.9, 0.18, 1), opacity 440ms ease, visibility 440ms ease;
    }

    .testament-panel:not(.is-retracted) .testament-trigger:hover .testament-label-stack,
    .testament-panel:not(.is-retracted) .testament-trigger:focus-visible .testament-label-stack {
      transform: translateY(-14px);
    }

    .testament-panel:not(.is-retracted):hover::before {
      inset: 10px;
      border-color: rgba(124, 58, 237, 0.32);
    }

    .testament-panel:not(.is-retracted):hover .testament-slot-image,
    .testament-trigger:focus-visible .testament-slot-image {
      opacity: 1;
    }

    .testament-kicker,
    .testament-name,
    .testament-image-note {
      color: var(--books-muted);
      font-size: 0.74rem;
      font-weight: 950;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .testament-kicker {
      color: rgba(31, 41, 51, 0.58);
    }

    .testament-word {
      font-family: var(--blackletter);
      font-size: clamp(5.5rem, 12.5vw, 12.5rem);
      font-weight: 700;
      line-height: 0.78;
      letter-spacing: 0.01em;
      color: var(--books-ink);
      text-shadow: 0 18px 40px rgba(11, 16, 32, 0.08);
    }

    .testament-name {
      color: var(--books-purple);
      font-size: clamp(1rem, 2vw, 1.45rem);
      letter-spacing: 0.1em;
    }

    .testament-image-note {
      color: rgba(31, 41, 51, 0.46);
      font-size: 0.66rem;
    }

    .testament-stage.is-old-open .testament-panel--old .testament-label-stack,
    .testament-stage.is-new-open .testament-panel--new .testament-label-stack {
      transform: translateX(-34vw) scale(0.82);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .testament-stage.is-old-open .testament-panel--new .testament-label-stack,
    .testament-stage.is-new-open .testament-panel--old .testament-label-stack {
      transform: scale(0.35);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .retracted-hint {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      writing-mode: vertical-rl;
      color: var(--books-ink);
      font-family: var(--editorial);
      font-size: clamp(1rem, 1.65vw, 1.65rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 0.95;
      text-transform: uppercase;
      white-space: nowrap;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      transform: perspective(700px) rotateY(88deg) translateX(24px);
      transition: opacity 360ms ease, transform 620ms cubic-bezier(0.2, 0.9, 0.18, 1);
    }

    .testament-panel--old .retracted-hint {
      transform-origin: left center;
    }

    .testament-panel--new .retracted-hint {
      transform-origin: right center;
    }

    .retracted-hint strong {
      display: block;
      margin-bottom: 8px;
      font-family: var(--blackletter);
      font-size: clamp(2.2rem, 4.4vw, 4rem);
      font-weight: 700;
      line-height: 0.9;
      text-transform: none;
    }

    .testament-stage.is-old-open .testament-panel--new .retracted-hint,
    .testament-stage.is-new-open .testament-panel--old .retracted-hint {
      opacity: 1;
      pointer-events: none;
      transform: perspective(700px) rotateY(0deg) translateX(0);
      transition-delay: 260ms;
    }

    .testament-panel.is-retracted {
      cursor: pointer;
    }

    .testament-panel.is-retracted::before {
      inset: 0;
      border-style: solid;
      border-color: rgba(31, 41, 51, 0.18);
    }

    .testament-panel.is-retracted:hover .retracted-hint {
      transform: perspective(700px) rotateY(0deg) translateX(0) translateY(-10px);
    }

    .testament-stage.is-old-open .testament-panel--new .testament-trigger,
    .testament-stage.is-new-open .testament-panel--old .testament-trigger {
      z-index: 8;
      padding: 0;
      cursor: pointer;
    }

    .testament-panel-content {
      position: relative;
      z-index: 4;
      height: calc(100svh - var(--header-height));
      opacity: 0;
      pointer-events: none;
      overflow-y: auto;
      padding: clamp(24px, 4vw, 56px);
      transform: translateX(-42px);
      transition: opacity 360ms ease, transform 640ms cubic-bezier(0.2, 0.9, 0.18, 1);
    }

    .testament-panel--new .testament-panel-content {
      transform: translateX(42px);
    }

    .testament-stage.is-old-open .testament-panel--old .testament-panel-content,
    .testament-stage.is-new-open .testament-panel--new .testament-panel-content {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
      transition-delay: 260ms;
    }

    .content-header {
      max-width: 980px;
      margin-bottom: 28px;
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      color: var(--books-gold);
      font-size: 0.75rem;
      font-weight: 950;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .content-title {
      margin: 0;
      color: var(--books-ink);
      font-family: var(--editorial);
      font-size: clamp(2.65rem, 6vw, 6rem);
      font-weight: 700;
      line-height: 0.88;
    }

    .content-copy {
      max-width: 780px;
      margin: 0;
      color: var(--books-text);
      font-size: clamp(1rem, 1.45vw, 1.18rem);
      font-weight: 650;
      line-height: 1.72;
    }

    .covenant-note {
      max-width: 720px;
      margin-top: 6px;
      color: var(--books-muted);
      font-size: clamp(0.9rem, 1.2vw, 1.02rem);
    }

    .covenant-note strong {
      color: var(--books-ink);
      font-weight: 900;
    }

    .category-list {
      display: grid;
      gap: 14px;
      width: min(1080px, 100%);
    }

    .category-card {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 0;
      border: 1px solid var(--books-line);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 50px rgba(11, 16, 32, 0.06);
      transform: translateY(22px);
      opacity: 0;
      transition: transform 430ms cubic-bezier(0.2, 0.9, 0.18, 1), opacity 300ms ease, border-color 200ms ease;
    }

    .testament-stage.is-old-open .testament-panel--old .category-card,
    .testament-stage.is-new-open .testament-panel--new .category-card {
      animation: categorySlideOut 560ms cubic-bezier(0.2, 0.9, 0.18, 1) both;
      animation-delay: calc(var(--card-index) * 90ms + 420ms);
    }

    @keyframes categorySlideOut {
      from {
        opacity: 0;
        transform: translateX(-48px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .testament-panel--new .category-card {
      transform: translateX(48px);
    }

    .testament-stage.is-new-open .testament-panel--new .category-card {
      animation-name: categorySlideOutRight;
    }

    @keyframes categorySlideOutRight {
      from {
        opacity: 0;
        transform: translateX(48px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .category-card.is-open {
      border-color: rgba(124, 58, 237, 0.46);
      background: #fff;
    }

    .category-button {
      width: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: center;
      padding: clamp(18px, 3vw, 28px);
      text-align: left;
      color: var(--books-ink);
    }

    .category-button:hover .category-title,
    .category-button:focus-visible .category-title {
      color: var(--books-purple);
    }

    .category-button:focus-visible {
      outline: 3px solid rgba(124, 58, 237, 0.38);
      outline-offset: -5px;
    }

    .category-title {
      display: block;
      font-family: var(--editorial);
      font-size: clamp(1.9rem, 4.4vw, 4.4rem);
      font-weight: 700;
      line-height: 0.95;
      transition: color 180ms ease;
    }

    .category-meta {
      display: block;
      margin-top: 8px;
      color: var(--books-muted);
      font-size: 0.76rem;
      font-weight: 950;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .category-icon {
      width: 44px;
      height: 44px;
      border: 1px solid var(--books-line);
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--books-purple);
      font-size: 1.35rem;
      font-weight: 900;
      transition: transform 260ms ease, border-color 260ms ease;
    }

    .category-card.is-open .category-icon {
      transform: rotate(45deg);
      border-color: rgba(124, 58, 237, 0.5);
    }

    .category-drawer {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      border-top: 1px solid transparent;
      transition: max-height 720ms cubic-bezier(0.2, 0.9, 0.18, 1), opacity 320ms ease, border-color 260ms ease;
    }

    .category-card.is-open .category-drawer {
      max-height: 2000px;
      opacity: 1;
      border-top-color: var(--books-line);
    }

    .category-inner {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(160px, 220px);
      gap: clamp(16px, 3vw, 28px);
      padding: 0 clamp(18px, 3vw, 28px) clamp(20px, 3vw, 30px);
    }

    .definition-block {
      display: grid;
      align-content: start;
      gap: 14px;
      padding-top: 22px;
    }

    .definition-label {
      color: var(--books-gold);
      font-size: 0.74rem;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .definition-text {
      margin: 0;
      color: var(--books-text);
      font-size: clamp(1rem, 1.45vw, 1.15rem);
      line-height: 1.72;
      font-weight: 650;
    }

    .category-image-slot {
      aspect-ratio: 9 / 16;
      min-height: 260px;
      display: grid;
      place-items: center;
      margin-top: 22px;
      border: 1px dashed rgba(31, 41, 51, 0.32);
      background: #f1eee7;
      color: rgba(31, 41, 51, 0.52);
      text-align: center;
      padding: 18px;
      font-size: 0.75rem;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .category-image-slot:hover {
      transform: translateY(-3px);
      border-color: rgba(124, 58, 237, 0.44);
    }

    .book-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .book-card {
      appearance: none;
      border: 1px solid var(--books-line);
      background: var(--books-paper);
      color: var(--books-ink);
      min-width: 150px;
      flex: 1 1 150px;
      min-height: 88px;
      padding: 12px;
      display: grid;
      gap: 8px;
      text-align: left;
      cursor: pointer;
      transform: translateY(18px);
      opacity: 0;
      transition: opacity 280ms ease, transform 360ms ease, border-color 160ms ease, background 160ms ease;
      transition-delay: calc(var(--book-index) * 42ms);
    }

    .category-card.is-open .book-card {
      opacity: 1;
      transform: translateY(0);
    }

    .book-card:hover,
    .book-card:focus-visible {
      background: #fff;
      border-color: rgba(124, 58, 237, 0.46);
      outline: none;
    }

    .book-name {
      display: block;
      color: var(--books-ink);
      font-size: 1rem;
      font-weight: 950;
      line-height: 1.1;
    }

    .book-mini {
      color: var(--books-muted);
      font-size: 0.72rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .case-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: stretch;
      justify-content: end;
      background: rgba(11, 16, 32, 0.6);
      padding: 18px;
    }

    .case-overlay.open {
      display: flex;
    }

    .case-study-card {
      width: min(900px, 100%);
      overflow: auto;
      border: 1px solid var(--books-line);
      background: var(--books-paper);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.25);
    }

    .case-top {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--books-line);
      background: rgba(252, 251, 248, 0.96);
      backdrop-filter: blur(12px);
    }

    .case-top span {
      color: var(--books-purple);
      font-size: 0.75rem;
      font-weight: 950;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .case-close {
      appearance: none;
      width: 42px;
      height: 42px;
      border: 1px solid var(--books-line);
      border-radius: 999px;
      background: #fff;
      color: var(--books-ink);
      font-size: 1.3rem;
      font-weight: 950;
      cursor: pointer;
    }

    .case-body {
      padding: clamp(24px, 4vw, 42px);
    }

    .case-body h2 {
      margin: 0;
      color: var(--books-ink);
      font-family: var(--editorial);
      font-size: clamp(2.6rem, 5vw, 5rem);
      line-height: 0.95;
    }

    .case-subtitle {
      margin: 12px 0 0;
      max-width: 680px;
      color: var(--books-text);
      font-size: 1.08rem;
      line-height: 1.7;
      font-weight: 650;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .case-section {
      padding: 18px;
      border: 1px solid var(--books-line);
      background: #fff;
    }

    .case-section.full {
      grid-column: 1 / -1;
    }

    .case-section h3 {
      margin: 0 0 10px;
      color: var(--books-ink);
      font-family: var(--editorial);
      font-size: 1.35rem;
      line-height: 1;
    }

    .case-section p {
      margin: 0;
      color: var(--books-text);
      line-height: 1.65;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .chip-list li {
      border: 1px solid var(--books-line);
      border-radius: 999px;
      background: var(--books-paper);
      padding: 7px 10px;
      color: var(--books-text);
      font-size: 0.86rem;
      font-weight: 750;
    }

    .evidence-slot-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .evidence-slot {
      min-height: 118px;
      display: grid;
      place-items: center;
      border: 1px dashed rgba(31, 41, 51, 0.32);
      background: #f1eee7;
      color: var(--books-muted);
      text-align: center;
      padding: 14px;
      font-size: 0.72rem;
      font-weight: 850;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      :root {
        --header-height: 66px;
      }

      .testament-stage {
        grid-template-columns: 1fr 1fr;
      }

      .testament-stage.is-old-open {
        grid-template-columns: minmax(0, calc(100% - 78px)) 78px;
      }

      .testament-stage.is-new-open {
        grid-template-columns: 78px minmax(0, calc(100% - 78px));
      }

      .testament-panel {
        min-height: calc(100svh - var(--header-height));
        border-right: 1px solid var(--books-soft-line);
        border-bottom: 0;
      }

      .testament-trigger {
        min-height: calc(100svh - var(--header-height));
      }

      .testament-stage.is-old-open .testament-panel--old .testament-trigger,
      .testament-stage.is-new-open .testament-panel--new .testament-trigger {
        pointer-events: none;
      }

      .retracted-hint {
        writing-mode: vertical-rl;
        font-size: clamp(2rem, 12vw, 3.4rem);
      }

      .testament-panel-content {
        height: calc(100svh - var(--header-height));
      }

      .category-inner,
      .case-grid,
      .evidence-slot-grid {
        grid-template-columns: 1fr;
      }

      .category-image-slot {
        width: min(190px, 100%);
        min-height: 300px;
      }
    }

    @media (max-width: 560px) {
      .nav-wrap {
        padding: 0 12px;
        grid-template-columns: 1fr;
        justify-items: center;
        height: auto;
        min-height: var(--header-height);
        gap: 8px;
      }

      .brand {
        font-size: 1.12rem;
      }

      .main-nav {
        gap: 10px;
        flex-wrap: wrap;
      }

      .main-nav a {
        padding: 7px 4px;
        font-size: 0.72rem;
      }

      .nav-right {
        justify-self: center;
        position: static;
        transform: none;
      }

      .testament-stage,
      .testament-stage.is-old-open,
      .testament-stage.is-new-open {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .testament-panel,
      .testament-trigger {
        min-height: clamp(420px, 78svh, 620px);
      }

      .testament-panel-content {
        height: auto;
        min-height: clamp(420px, 78svh, 620px);
      }

      .testament-word {
        font-size: clamp(5rem, 30vw, 9rem);
      }

      .testament-panel-content {
        padding: 22px 16px;
      }

      .category-button {
        grid-template-columns: 1fr;
      }

      .category-icon {
        justify-self: start;
      }

      .case-overlay {
        padding: 0;
      }

      .case-study-card {
        min-height: 100svh;
      }
    }
  </style>
</head>

    const newContent = document.getElementById("newContent");
    const overlay = document.getElementById("caseOverlay");
    const caseBody = document.getElementById("caseBody");
    const caseMeta = document.getElementById("caseMeta");
    const caseClose = document.getElementById("caseClose");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#039;",
        '"': "&quot;"
      }[char]));
    }

    function booksFor(testament, category) {
      return bookData.filter(book => book.testament === testament && book.category === category);
    }

    function renderTestament(testament, mount) {
      const info = testamentInfo[testament];
      const categories = categoryOrder[testament];

      mount.innerHTML = `
        <div class="content-header">
          <span class="eyebrow">${escapeHtml(info.eyebrow)}</span>
          <h2 class="content-title">${escapeHtml(info.title)}</h2>
          <p class="content-copy">${escapeHtml(info.copy)}</p>
          <p class="content-copy covenant-note">${escapeHtml(info.note)}</p>
        </div>
        <div class="category-list">
          ${categories.map((category, index) => {
            const categoryBooks = booksFor(testament, category);
            return `
              <article class="category-card" style="--card-index:${index}">
                <button class="category-button" type="button" aria-expanded="false" data-category="${escapeHtml(category)}">
                  <span>
                    <span class="category-title">${escapeHtml(category)}</span>
                    <span class="category-meta">${categoryBooks.length} book${categoryBooks.length === 1 ? "" : "s"} • Click to open</span>
                  </span>
                  <span class="category-icon" aria-hidden="true">+</span>
                </button>
                <div class="category-drawer" aria-hidden="true">
                  <div class="category-inner">
                    <div class="definition-block">
                      <span class="definition-label">Definition</span>
                      <p class="definition-text">${escapeHtml(categoryDefinitions[category])}</p>
                      <div class="book-strip">
                        ${categoryBooks.map((book, bookIndex) => `
                          <button class="book-card" type="button" style="--book-index:${bookIndex}" data-book="${escapeHtml(book.title)}">
                            <span class="book-name">${escapeHtml(book.title)}</span>
                            <span class="book-mini">${escapeHtml(book.meaning)} • ${escapeHtml(book.summary)}</span>
                          </button>
                        `).join("")}
                      </div>
                    </div>
                    <div class="category-image-slot">9:16 Image Slot<br />${escapeHtml(category)}</div>
                  </div>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function openTestament(testament) {
      const oldButton = document.querySelector('[data-testament="Old Testament"]');
      const newButton = document.querySelector('[data-testament="New Testament"]');
      const oldPanel = document.querySelector('.testament-panel--old');
      const newPanel = document.querySelector('.testament-panel--new');

      stage.classList.toggle("is-old-open", testament === "Old Testament");
      stage.classList.toggle("is-new-open", testament === "New Testament");

      oldPanel.classList.toggle("is-retracted", testament === "New Testament");
      newPanel.classList.toggle("is-retracted", testament === "Old Testament");

      oldButton.setAttribute("aria-expanded", String(testament === "Old Testament"));
      newButton.setAttribute("aria-expanded", String(testament === "New Testament"));
      oldContent.setAttribute("aria-hidden", String(testament !== "Old Testament"));
      newContent.setAttribute("aria-hidden", String(testament !== "New Testament"));
    }

    function toggleCategory(button) {
      const card = button.closest(".category-card");
      const drawer = card.querySelector(".category-drawer");
      const panel = button.closest(".testament-panel-content");
      const alreadyOpen = card.classList.contains("is-open");

      panel.querySelectorAll(".category-card.is-open").forEach(openCard => {
        openCard.classList.remove("is-open");
        openCard.querySelector(".category-button")?.setAttribute("aria-expanded", "false");
        openCard.querySelector(".category-drawer")?.setAttribute("aria-hidden", "true");
      });

      if (!alreadyOpen) {
        card.classList.add("is-open");
        button.setAttribute("aria-expanded", "true");
        drawer.setAttribute("aria-hidden", "false");
      }
    }

    function openBookCaseStudy(title) {
      const book = bookData.find(item => item.title === title);
      if (!book) return;

      caseMeta.textContent = `${book.testament} • ${book.category}`;
      caseBody.innerHTML = `
        <h2 id="caseTitle">${escapeHtml(book.title)}</h2>
        <p class="case-subtitle">${escapeHtml(book.summary)}</p>

        <div class="case-grid">
          <section class="case-section">
            <h3>Original Title</h3>
            <p><strong>${escapeHtml(book.original)}</strong></p>
          </section>

          <section class="case-section">
            <h3>Name Meaning</h3>
            <p>${escapeHtml(book.meaning)}</p>
          </section>

          <section class="case-section full">
            <h3>Why It Matters</h3>
            <p>${escapeHtml(book.title)} belongs to ${escapeHtml(book.category)}. ${escapeHtml(book.summary)} This section is ready for a deeper BibleMapped case study.</p>
          </section>

          <section class="case-section full">
            <h3>Image Slots</h3>
            <div class="evidence-slot-grid">
              ${overlayImageSlots.map(slot => `<div class="evidence-slot">${escapeHtml(slot)}</div>`).join("")}
            </div>
          </section>

          <section class="case-section full">
            <h3>Next Build Step</h3>
            <ul class="chip-list">
              <li>Map layer</li>
              <li>People list</li>
              <li>Timeline</li>
              <li>Key verses</li>
              <li>Sources</li>
            </ul>
          </section>
        </div>
      `;

      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      caseClose.focus();
    }

    document.addEventListener("click", event => {
      const testamentButton = event.target.closest("[data-testament]");
      if (testamentButton) {
        openTestament(testamentButton.dataset.testament);
        return;
      }

      const categoryButton = event.target.closest(".category-button");
      if (categoryButton) {
        toggleCategory(categoryButton);
        return;
      }

      const bookButton = event.target.closest(".book-card");
      if (bookButton) {
        openBookCaseStudy(bookButton.dataset.book);
      }
    });

    function closeOverlay() {
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
    }

    caseClose.addEventListener("click", closeOverlay);

    overlay.addEventListener("click", event => {
      if (event.target === overlay) {
        closeOverlay();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeOverlay();
      }
    });

    renderTestament("Old Testament", oldContent);
    renderTestament("New Testament", newContent);
  </script>
</body>
</html>
